services:
  nginx:
    image: nginx:alpine
    ports:
      - "9999:9999"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-1
      - api-2
    networks:
      - rinha-net
    deploy:
      resources:
        limits:
          cpus: "0.19"
          memory: "20MB"

  api-1:
    hostname: api-1
    image: paulohrpinheiro/rinha-api-v:v1
    environment:
      - PORT=8080
      - RESOURCES_DIR=/resources
      - HOSTNAME=api-1
    networks:
      - rinha-net
    deploy:
      resources:
        limits:
          cpus: "0.405"
          memory: "165MB"

  api-2:
    hostname: api-2
    image: paulohrpinheiro/rinha-api-v:v1
    environment:
      - PORT=8080
      - RESOURCES_DIR=/resources
      - HOSTNAME=api-2
    networks:
      - rinha-net
    deploy:
      resources:
        limits:
          cpus: "0.405"
          memory: "165MB"

networks:
  rinha-net:
    driver: bridge
