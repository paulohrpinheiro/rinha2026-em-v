# nginx.conf — Proxy reverso Rinha de Backend 2026.
# least_conn entre api-1:8080 e api-2:8080, sem lógica de negócio.

events { worker_connections 1024; }

http {
    access_log off;
    error_log /dev/stderr;

    upstream api_backends {
        least_conn;
        server api-1:8080;
        server api-2:8080;
    }

    server {
        listen 9999;

        location /ready {
            proxy_pass http://api_backends/ready;
            proxy_http_version 1.1;
        }

        location /fraud-score {
            proxy_pass http://api_backends/fraud-score;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_read_timeout 200ms;
            proxy_send_timeout 200ms;
        }
    }
}
