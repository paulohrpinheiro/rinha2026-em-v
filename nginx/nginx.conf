# nginx.conf — Proxy reverso Rinha de Backend 2026.
# Modo stream (TCP/UDP proxy), zero parsing HTTP.

events { worker_connections 1024; }

stream {
    upstream api_backends {
        least_conn;
        server unix:/sockets/api-1.sock;
        server unix:/sockets/api-2.sock;
    }

    server {
        listen 9999;
        proxy_pass api_backends;
    }
}
